<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f2937">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/static/icon.svg">
  <title>Growth LMS</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 4rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.25rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tabs button { flex: 1; padding: 0.5rem; border: 1px solid #ddd; background: #f7f7f7; border-radius: 6px; cursor: pointer; }
    .tabs button.active { background: #222; color: #fff; border-color: #222; }
    form { display: none; flex-direction: column; gap: 0.75rem; }
    form.active { display: flex; }
    input { padding: 0.5rem; border: 1px solid #ccc; border-radius: 6px; }
    button[type="submit"] { padding: 0.6rem; border: none; border-radius: 6px; background: #222; color: #fff; cursor: pointer; }
    .message { margin-top: 1rem; padding: 0.6rem; border-radius: 6px; }
    .message.error { background: #fee; color: #900; }
    .message.success { background: #efe; color: #060; }
    .message.hidden { display: none; }
    :focus-visible { outline: 2px solid #1d4ed8; outline-offset: 2px; }
  </style>
  <script src="/static/app.js"></script>
</head>
<body>
  <main id="main-content">
  <h1>Growth LMS</h1>
  <p>Sign in to continue, or create an account.</p>

  <div class="tabs">
    <button type="button" id="tab-login" class="active" onclick="showForm('login')">Log in</button>
    <button type="button" id="tab-register" onclick="showForm('register')">Sign up</button>
  </div>

  <form id="form-login" class="active" onsubmit="return handleLogin(event)">
    <label for="login-email">Email</label>
    <input type="email" id="login-email" name="email" placeholder="Email" required>
    <label for="login-password">Password</label>
    <input type="password" id="login-password" name="password" placeholder="Password" required>
    <button type="submit">Log in</button>
  </form>

  <form id="form-register" onsubmit="return handleRegister(event)">
    <label for="register-email">Email</label>
    <input type="email" id="register-email" name="email" placeholder="Email" required>
    <label for="register-password">Password</label>
    <input type="password" id="register-password" name="password" placeholder="Password (min 8 characters)" minlength="8" required>
    <button type="submit">Sign up</button>
  </form>

  <div id="message" class="message hidden"></div>
  </main>

  <script>
    function showForm(which) {
      document.getElementById('form-login').classList.toggle('active', which === 'login');
      document.getElementById('form-register').classList.toggle('active', which === 'register');
      document.getElementById('tab-login').classList.toggle('active', which === 'login');
      document.getElementById('tab-register').classList.toggle('active', which === 'register');
      setMessage('');
    }

    function setMessage(text, kind) {
      const el = document.getElementById('message');
      if (!text) { el.classList.add('hidden'); return; }
      el.textContent = text;
      el.className = 'message ' + (kind || 'error');
    }

    async function handleLogin(event) {
      event.preventDefault();
      const form = event.target;
      const body = { email: form.email.value, password: form.password.value };
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setMessage(data.error || 'Login failed');
          return false;
        }
        window.location.href = '/dashboard';
      } catch (err) {
        setMessage('Network error — check your connection and try again');
      }
      return false;
    }

    async function handleRegister(event) {
      event.preventDefault();
      const form = event.target;
      const body = { email: form.email.value, password: form.password.value };
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setMessage(data.error || 'Registration failed');
          return false;
        }
        setMessage(data.message || 'Check your email to verify your account', 'success');
        form.reset();
      } catch (err) {
        setMessage('Network error — check your connection and try again');
      }
      return false;
    }
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moderation — Growth LMS</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
{{template "nav-styles" .}}
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  .report { border: 1px solid #e2e2e2; border-radius: 8px; padding: 0.7rem 1rem; margin: 0.5rem 0; }
  .report .meta { color: #888; font-size: 0.8rem; }
  button { padding: 0.4rem 0.7rem; cursor: pointer; margin-right: 0.4rem; }
</style>
</head>
<body>
{{template "nav-placeholder" .}}
<h1>Moderation queue</h1>
<div id="reports">Loading…</div>

<script>
const slug = {{.Slug}};
async function load() {
  const r = await fetch(`/api/orgs/${slug}/reports`, {headers:{'Accept':'application/json'}});
  if (!r.ok) { document.getElementById('reports').textContent = 'Not authorized.'; return; }
  const data = await r.json();
  const el = document.getElementById('reports');
  if (!data.reports || !data.reports.length) { el.innerHTML = '<p>No open reports. 🎉</p>'; return; }
  el.innerHTML = data.reports.map(rep => `
    <div class="report">
      <div><strong>Reason:</strong> ${escapeHtml(rep.reason)}</div>
      <div class="meta">post ${rep.post_id} · ${new Date(rep.created_at).toLocaleString()}</div>
      <div style="margin-top:0.5rem">
        <button onclick="act('${rep.id}','resolve')">Resolve</button>
        <button onclick="act('${rep.id}','dismiss')">Dismiss</button>
      </div>
    </div>`).join('');
}
async function act(id, action){ await fetch(`/api/orgs/${slug}/reports/${id}/${action}`,{method:'POST'}); load(); }
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
load();
</script>
</body>
</html>

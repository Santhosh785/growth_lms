# Production reverse proxy: terminates TLS with certbot-issued certificates
# (renewed via a cron/systemd timer on the VPS, set up manually — see
# docs/DEVELOPMENT.md) and forwards X-Forwarded-* headers to the app.
#
# Replace lms.example.com and the certificate paths with the real domain
# before deploying; certbot --nginx will rewrite this file in place on
# first issuance if you use that mode instead of manual paths.

events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name lms.example.com;

        # certbot HTTP-01 challenge location
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name lms.example.com;

        ssl_certificate     /etc/letsencrypt/live/lms.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lms.example.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
